<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCraftHub - Course Dashboard</title>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            --warning: #ca8a04;
            --danger: #dc2626;
            --bg: #f5f7fb;
            --card: #ffffff;
            --border: #dbe2ea;
            --text: #1f2937;
            --muted: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2rem;
        }

        .btn-primary,
        .btn-secondary,
        .btn-danger {
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #111827;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            opacity: 0.9;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .section-title {
            margin-bottom: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }

        .stat-card {
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            background: white;
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.9rem;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full {
            grid-column: 1 / -1;
        }

        label {
            margin-bottom: 6px;
            font-weight: 600;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
        }

        .loading,
        .empty-state {
            text-align: center;
            padding: 24px;
            color: var(--muted);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            text-align: left;
        }

        th {
            background: #f9fafb;
        }

        .status-badge {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-not-started {
            background: #e5e7eb;
        }

        .status-in-progress {
            background: #fef3c7;
        }

        .status-completed {
            background: #dcfce7;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            table {
                min-width: 800px;
            }

            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>CodeCraftHub Dashboard</h1>
            <button class="btn-primary" id="refreshBtn">
                Refresh Courses
            </button>
        </header>

        <div id="message" class="message"></div>

        <!-- Statistics -->
        <section class="card">
            <h2 class="section-title">Statistics</h2>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Courses</div>
                    <div class="stat-value" id="totalCourses">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Not Started</div>
                    <div class="stat-value" id="notStartedCount">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">In Progress</div>
                    <div class="stat-value" id="inProgressCount">0</div>
                </div>

                <div class="stat-card">
                    <div class="stat-label">Completed</div>
                    <div class="stat-value" id="completedCount">0</div>
                </div>
            </div>
        </section>

        <!-- Form -->
        <section class="card">
            <h2 class="section-title" id="formTitle">Add Course</h2>

            <form id="courseForm">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="name">Course Name</label>
                        <input type="text" id="name" required />
                    </div>

                    <div class="form-group">
                        <label for="target_date">Target Date</label>
                        <input type="date" id="target_date" required />
                    </div>

                    <div class="form-group full">
                        <label for="description">Description</label>
                        <textarea id="description" required></textarea>
                    </div>

                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status" required>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>

                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" id="submitBtn">
                        Add Course
                    </button>

                    <button type="button" class="btn-secondary" id="cancelEditBtn" style="display:none">
                        Cancel Edit
                    </button>
                </div>

            </form>
        </section>

        <!-- Courses -->
        <section class="card">
            <h2 class="section-title">Courses</h2>

            <div id="loading" class="loading">
                Loading courses...
            </div>

            <div id="emptyState" class="empty-state" style="display:none;">
                No courses found.
            </div>

            <div class="table-wrapper">
                <table id="coursesTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Target Date</th>
                            <th>Status</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody id="coursesBody"></tbody>
                </table>
            </div>

        </section>

    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000";

        let editingCourseId = null;

        const form = document.getElementById("courseForm");
        const messageBox = document.getElementById("message");
        const coursesBody = document.getElementById("coursesBody");

        function showMessage(text, type = "success") {
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
            messageBox.style.display = "block";

            setTimeout(() => {
                messageBox.style.display = "none";
            }, 5000);
        }

        function getStatusClass(status) {
            switch (status) {
                case "Completed":
                    return "status-completed";
                case "In Progress":
                    return "status-in-progress";
                default:
                    return "status-not-started";
            }
        }

        async function handleResponse(response) {
            let data = null;

            try {
                data = await response.json();
            } catch { }

            if (!response.ok) {
                throw new Error(data?.error || "Request failed");
            }

            return data;
        }

        async function loadStats() {
            try {
                const response = await fetch(
                    `${API_BASE}/api/courses/stats`
                );

                const stats = await handleResponse(response);

                document.getElementById("totalCourses").textContent =
                    stats.total || 0;

                document.getElementById("notStartedCount").textContent =
                    stats.not_started || 0;

                document.getElementById("inProgressCount").textContent =
                    stats.in_progress || 0;

                document.getElementById("completedCount").textContent =
                    stats.completed || 0;

            } catch (error) {
                console.error(error);
            }
        }

        async function loadCourses() {

            const loading = document.getElementById("loading");
            const empty = document.getElementById("emptyState");
            const table = document.getElementById("coursesTable");

            loading.style.display = "block";
            empty.style.display = "none";
            table.style.display = "none";

            try {

                const response = await fetch(
                    `${API_BASE}/api/courses`
                );

                const courses = await handleResponse(response);

                coursesBody.innerHTML = "";

                if (!courses.length) {
                    empty.style.display = "block";
                    return;
                }

                courses.forEach(course => {

                    const row = document.createElement("tr");

                    row.innerHTML = `
                <td>${course.id}</td>
                <td>${escapeHtml(course.name)}</td>
                <td>${escapeHtml(course.description)}</td>
                <td>${course.target_date}</td>
                <td>
                    <span class="status-badge ${getStatusClass(course.status)}">
                        ${course.status}
                    </span>
                </td>
                <td>${formatDate(course.created_at)}</td>
                <td>
                    <div class="actions">
                        <button
                            class="btn-secondary"
                            onclick="editCourse(${course.id})"
                        >
                            Edit
                        </button>

                        <button
                            class="btn-danger"
                            onclick="deleteCourse(${course.id})"
                        >
                            Delete
                        </button>
                    </div>
                </td>
            `;

                    coursesBody.appendChild(row);
                });

                table.style.display = "table";

            } catch (error) {
                showMessage(error.message, "error");
            } finally {
                loading.style.display = "none";
            }
        }

        function formatDate(date) {
            if (!date) return "-";

            try {
                return new Date(date).toLocaleString();
            } catch {
                return date;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        async function editCourse(id) {
            try {

                const response = await fetch(
                    `${API_BASE}/api/courses/${id}`
                );

                const course = await handleResponse(response);

                editingCourseId = id;

                document.getElementById("name").value =
                    course.name || "";

                document.getElementById("description").value =
                    course.description || "";

                document.getElementById("target_date").value =
                    course.target_date || "";

                document.getElementById("status").value =
                    course.status || "Not Started";

                document.getElementById("formTitle").textContent =
                    "Edit Course";

                document.getElementById("submitBtn").textContent =
                    "Update Course";

                document.getElementById("cancelEditBtn").style.display =
                    "inline-block";

                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });

            } catch (error) {
                showMessage(error.message, "error");
            }
        }

        async function deleteCourse(id) {

            const confirmed = confirm(
                "Are you sure you want to delete this course?"
            );

            if (!confirmed) return;

            try {

                const response = await fetch(
                    `${API_BASE}/api/courses/${id}`,
                    {
                        method: "DELETE"
                    }
                );

                if (!response.ok) {
                    let data = {};
                    try {
                        data = await response.json();
                    } catch { }

                    throw new Error(
                        data.error || "Delete failed"
                    );
                }

                showMessage("Course deleted successfully");

                await Promise.all([
                    loadCourses(),
                    loadStats()
                ]);

            } catch (error) {
                showMessage(error.message, "error");
            }
        }

        function resetForm() {

            editingCourseId = null;

            form.reset();

            document.getElementById("formTitle").textContent =
                "Add Course";

            document.getElementById("submitBtn").textContent =
                "Add Course";

            document.getElementById("cancelEditBtn").style.display =
                "none";

            document.getElementById("status").value =
                "Not Started";
        }

        form.addEventListener("submit", async (e) => {

            e.preventDefault();

            const payload = {
                name: document.getElementById("name").value.trim(),
                description: document.getElementById("description").value.trim(),
                target_date: document.getElementById("target_date").value,
                status: document.getElementById("status").value
            };

            if (
                !payload.name ||
                !payload.description ||
                !payload.target_date ||
                !payload.status
            ) {
                showMessage(
                    "All fields are required.",
                    "error"
                );
                return;
            }

            try {

                const isEditing = editingCourseId !== null;

                const response = await fetch(
                    isEditing
                        ? `${API_BASE}/api/courses/${editingCourseId}`
                        : `${API_BASE}/api/courses`,
                    {
                        method: isEditing ? "PUT" : "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(payload)
                    }
                );

                await handleResponse(response);

                showMessage(
                    isEditing
                        ? "Course updated successfully"
                        : "Course created successfully"
                );

                resetForm();

                await Promise.all([
                    loadCourses(),
                    loadStats()
                ]);

            } catch (error) {
                showMessage(error.message, "error");
            }
        });

        document
            .getElementById("cancelEditBtn")
            .addEventListener("click", resetForm);

        document
            .getElementById("refreshBtn")
            .addEventListener("click", async () => {
                await Promise.all([
                    loadCourses(),
                    loadStats()
                ]);
            });

        (async function init() {
            await Promise.all([
                loadCourses(),
                loadStats()
            ]);
        })();
    </script>

</body>

</html>
